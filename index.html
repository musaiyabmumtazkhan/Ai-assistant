<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Robot Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,Segoe UI,Roboto;background:linear-gradient(180deg,#faf5ff,#f8fafc);color:#111827;padding:20px;transition:.3s;}
body.dark{background:#0f172a;color:#e5e7eb;}
.container{max-width:720px;margin:auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.left{display:flex;align-items:center;gap:12px;}
.logo{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,#9333ea,#6d28d9);display:flex;align-items:center;justify-content:center;animation:float 3s ease-in-out infinite;}
.logo img{width:32px;}
@keyframes float{0%{transform:translateY(0);}50%{transform:translateY(-4px);}100%{transform:translateY(0);}}
.toggle{padding:6px 12px;border-radius:10px;border:1px solid #e5e7eb;background:white;cursor:pointer;}
body.dark .toggle{background:#1e293b;border:none;color:white;}
.card{background:white;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 6px 20px rgba(0,0,0,0.05);}
body.dark .card{background:#1e293b;}
textarea{width:100%;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-top:10px;font-size:14px;min-height:90px;resize:none;outline:none;}
body.dark textarea{background:#0f172a;color:white;border:1px solid #334155;}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.btn{height:36px;padding:0 16px;border-radius:10px;border:1px solid #e5e7eb;background:white;cursor:pointer;}
body.dark .btn{background:#0f172a;color:white;border:1px solid #334155;}
.copy{margin-top:12px;height:42px;padding:0 22px;border:none;border-radius:10px;background:#7c3aed;color:white;cursor:pointer;}
.chat{margin-top:12px;display:flex;}
.bubble{padding:14px 16px;border-radius:16px;font-size:14px;max-width:75%;line-height:1.5;box-shadow:0 3px 10px rgba(0,0,0,0.05);}
.client{background:#f1f5f9;}
.ai{background:#ede9fe;margin-right:auto;}
body.dark .client{background:#334155;}
body.dark .ai{background:#4c1d95;}
.lang{font-size:12px;color:#6b7280;margin-top:6px;}
.quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.quick button{padding:6px 12px;border-radius:20px;border:1px solid #ddd;background:#f3f4f6;cursor:pointer;font-size:13px;}
</style>
</head>
<body>

<div class="container">

<div class="header">
<div class="left">
<div class="logo"><img src="https://cdn-icons-png.flaticon.com/512/17115/17115952.png"></div>
<div><b style="font-size:22px;">AI Robot Assistant</b><br><small>by Musaiyab</small></div>
</div>
<button class="toggle" onclick="document.body.classList.toggle('dark')">🌙</button>
</div>

<!-- Client Section -->
<div class="card">
<b>Client Message</b>
<div class="controls">
<button class="btn" onclick="pasteClient()">Paste</button>
<button class="btn" onclick="resetClient()">Reset</button>
<select id="manualLang" class="btn">
<option value="auto">Auto</option>
<option value="en">English</option>
<option value="nl">Dutch</option>
<option value="de">German</option>
<option value="ar">Arabic</option>
<option value="fr">French</option>
<option value="es">Spanish</option>
</select>
</div>
<textarea id="clientText" placeholder="Paste client message"></textarea>
<div class="lang" id="langIndicator"></div>
<div class="chat"><div class="bubble client" id="englishText"></div></div>
</div>

<!-- Reply Section -->
<div class="card">
<b>Your Reply</b>
<div class="controls">
<button class="btn" onclick="resetReply()">Reset</button>
<button class="btn" id="micBtn" onclick="startVoice()">🎤 Voice</button>
</div>
<textarea id="replyText" placeholder="Write your reply"></textarea>

<div class="chat"><div class="bubble ai" id="finalReply"></div></div>
<button class="copy" onclick="copyReply()">Copy Reply</button>
</div>

</div>

<script>
let clientLang="auto";
const flags={en:"🇬🇧",nl:"🇳🇱",ar:"🇸🇦",de:"🇩🇪",fr:"🇫🇷",es:"🇪🇸"};

/* Client Translate */
clientText.addEventListener("input",async function(){
  let text=this.value;
  if(text.length<2){englishText.innerText=""; finalReply.innerText=""; return;}
  let res=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`);
  let data=await res.json();
  let english=data[0].map(x=>x[0]).join("");
  englishText.innerText=english;
  clientLang=document.getElementById("manualLang").value!=="auto"?document.getElementById("manualLang").value:data[2];

  // Translate english → clientLang
  if(clientLang!=="en"){
    let tr=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${clientLang}&dt=t&q=${encodeURIComponent(english)}`);
    let dtr=await tr.json();
    finalReply.innerText=dtr[0].map(x=>x[0]).join("");
  }else{
    finalReply.innerText=english;
  }

  langIndicator.innerHTML=(flags[clientLang]||"🌐")+" "+clientLang;
});

/* Quick Reply */
function quick(text){replyText.value=text;replyText.dispatchEvent(new Event("input"));}

/* Copy */
function copyReply(){navigator.clipboard.writeText(finalReply.innerText);}

/* Paste */
async function pasteClient(){const text=await navigator.clipboard.readText();clientText.value=text;clientText.dispatchEvent(new Event("input"));}

/* Reset */
function resetClient(){clientText.value="";englishText.innerText="";finalReply.innerText="";langIndicator.innerText="";}
function resetReply(){replyText.value="";finalReply.innerText="";}

/* Voice */
function startVoice(){
  const btn=document.getElementById("micBtn");
  const rec=new webkitSpeechRecognition();
  rec.continuous=true; rec.interimResults=false; rec.lang="en-US";
  btn.classList.add("recording");
  rec.onresult=async function(e){
    let speech=e.results[e.results.length-1][0].transcript;
    replyText.value=speech;
    replyText.dispatchEvent(new Event("input"));
  };
  rec.onend=function(){btn.classList.remove("recording");};
  rec.start();
}

/* Reply Translate */
replyText.addEventListener("input",async function(){
  let text=this.value;
  if(text.length<2){finalReply.innerText=""; return;}
  let res=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${clientLang}&dt=t&q=${encodeURIComponent(text)}`);
  let data=await res.json();
  finalReply.innerText=data[0].map(x=>x[0]).join("");
});
</script>
</body>
</html>
