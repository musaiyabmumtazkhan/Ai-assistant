<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Assistant Robot</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<meta name="theme-color" content="#6d28d9">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:system-ui,Segoe UI,Roboto;
background:linear-gradient(180deg,#faf5ff,#f1f5f9);
padding:24px 14px;
color:#111;
transition:0.3s;
}

body.darkmode{
background:#0f172a;
color:#e5e7eb;
}

.wrapper{
max-width:720px;
margin:auto;
}

/* TOP BAR */

.topbar{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:26px;
}

.brand{
display:flex;
align-items:center;
gap:14px;
}

.iconbox{
width:56px;
height:56px;
border-radius:16px;
background:linear-gradient(135deg,#7c3aed,#4c1d95);
display:flex;
align-items:center;
justify-content:center;
animation:floaty 3s infinite ease-in-out;
}

.iconbox img{
width:32px;
}

@keyframes floaty{
0%{transform:translateY(0)}
50%{transform:translateY(-5px)}
100%{transform:translateY(0)}
}

.switch{
border:1px solid #e5e7eb;
background:white;
border-radius:10px;
padding:8px 12px;
cursor:pointer;
}

.darkmode .switch{
background:#1e293b;
border:none;
color:white;
}

/* BOX */

.panel{
background:white;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.darkmode .panel{
background:#1e293b;
}

/* INPUT */

textarea{
width:100%;
border:1px solid #e5e7eb;
border-radius:12px;
padding:14px;
margin-top:10px;
font-size:14px;
min-height:90px;
resize:none;
outline:none;
}

.darkmode textarea{
background:#0f172a;
border:1px solid #334155;
color:white;
}

/* BUTTONS */

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.actionBtn{
height:38px;
padding:0 16px;
border-radius:10px;
border:1px solid #e5e7eb;
background:white;
cursor:pointer;
}

.darkmode .actionBtn{
background:#0f172a;
border:1px solid #334155;
color:white;
}

.mainBtn{
margin-top:14px;
border:none;
height:42px;
padding:0 22px;
border-radius:10px;
background:#7c3aed;
color:white;
cursor:pointer;
}

/* CHAT BUBBLES */

.chatrow{
margin-top:12px;
display:flex;
}

.msg{
padding:14px 16px;
border-radius:16px;
font-size:14px;
line-height:1.5;
max-width:75%;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.user{
background:#f1f5f9;
}

.bot{
background:#ede9fe;
margin-right:auto;
}

.darkmode .user{
background:#334155;
}

.darkmode .bot{
background:#4c1d95;
}

.langinfo{
font-size:12px;
color:#6b7280;
margin-top:6px;
}

</style>

</head>

<body>

<div class="wrapper">

<!-- HEADER -->

<div class="topbar">

<div class="brand">

<div class="iconbox">
<img src="https://cdn-icons-png.flaticon.com/512/17115/17115952.png">
</div>

<div>
<b style="font-size:22px">AI Robot Assistant</b><br>
<small>by Musaiyab</small>
</div>

</div>

<button class="switch" onclick="toggleMode()">рџЊ™</button>

</div>


<!-- CLIENT SECTION -->

<div class="panel">

<b>Client Message</b>

<div class="actions">
<button class="actionBtn" onclick="pasteMessage()">Paste</button>
<button class="actionBtn" onclick="clearClient()">Reset</button>
</div>

<textarea id="clientBox" placeholder="Paste client message"></textarea>

<div class="langinfo" id="langShow"></div>

<div class="chatrow">
<div class="msg user" id="translatedText"></div>
</div>

</div>


<!-- REPLY SECTION -->

<div class="panel">

<b>Your Reply</b>

<div class="actions">
<button class="actionBtn" onclick="clearReply()">Reset</button>
<button class="actionBtn" onclick="voiceInput()">рџЋ¤ Voice</button>
</div>

<textarea id="replyBox" placeholder="Write your reply"></textarea>

<div class="chatrow">
<div class="msg bot" id="replyTranslated"></div>
</div>

<button class="mainBtn" onclick="copyReply()">Copy Reply</button>

</div>

</div>


<script>

let detectedLang="auto";

const flagMap={
en:"рџ‡¬рџ‡§",
nl:"рџ‡ірџ‡±",
ar:"рџ‡ёрџ‡¦",
de:"рџ‡©рџ‡Є",
fr:"рџ‡«рџ‡·",
es:"рџ‡Єрџ‡ё"
};

/* DARK MODE */

function toggleMode(){
document.body.classList.toggle("darkmode");
}

/* CLIENT INPUT */

clientBox.addEventListener("input",async function(){

let text=this.value;

if(text.length<2)return;

let res=await fetch(
`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`
);

let data=await res.json();

detectedLang=data[2];

let english=data[0].map(v=>v[0]).join("");

translatedText.innerText=english;

let flag=flagMap[detectedLang]||"рџЊђ";

langShow.innerHTML=flag+" "+detectedLang;

});


/* REPLY INPUT */

let delay;

replyBox.addEventListener("input",function(){

clearTimeout(delay);

delay=setTimeout(async()=>{

let text=this.value;

if(text.length<2)return;

let res=await fetch(
`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${detectedLang}&dt=t&q=${encodeURIComponent(text)}`
);

let data=await res.json();

let translated=data[0].map(v=>v[0]).join("");

replyTranslated.innerText=translated;

localStorage.setItem("lastReply",translated);

},300);

});


/* COPY */

function copyReply(){
navigator.clipboard.writeText(replyTranslated.innerText);
}


/* PASTE */

async function pasteMessage(){

let text=await navigator.clipboard.readText();

clientBox.value=text;

clientBox.dispatchEvent(new Event("input"));

}


/* RESET */

function clearClient(){
clientBox.value="";
translatedText.innerText="";
langShow.innerText="";
}

function clearReply(){
replyBox.value="";
replyTranslated.innerText="";
}

/* VOICE */

function startVoice(){

const rec = new webkitSpeechRecognition();

rec.lang = "ur-PK";   // Urdu + Hindi + English detect
rec.interimResults = false;

rec.onresult = async function(e){

let speech = e.results[0][0].transcript;

/* STEP 1 вЂ” speech в†’ English */

let r1 = await fetch(
`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(speech)}`
);

let d1 = await r1.json();

let english = d1[0].map(x=>x[0]).join("");

replyText.value = english;


/* STEP 2 вЂ” English в†’ client language */

let r2 = await fetch(
`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${clientLang}&dt=t&q=${encodeURIComponent(english)}`
);

let d2 = await r2.json();

let final = d2[0].map(x=>x[0]).join("");

finalReply.innerText = final;

saveHistory();

};

rec.start();

}


/* LOAD LAST */

window.onload=function(){

let last=localStorage.getItem("lastReply");

if(last) replyTranslated.innerText=last;

}

</script>

</body>
</html>
