<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">
<link rel="icon" href="favicon.png">
<style>
/* --- Modern Dark/Light UI --- */
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui;}
body{background:#f9fafb;color:#111827;transition:.3s;}
body.dark{background:#0f172a;color:#e5e7eb;}
.app{max-width:900px;margin:auto;padding:30px 20px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.brand{display:flex;align-items:center;gap:12px;}
.logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#9333ea,#6d28d9);display:flex;align-items:center;justify-content:center;}
.logo img{width:28px;}
.title{font-size:20px;font-weight:600;}
.toggle{cursor:pointer;padding:8px 12px;border-radius:10px;border:1px solid #e5e7eb;background:white;}
.dark .toggle{background:#1e293b;border:none;color:white;}
.chat{display:flex;flex-direction:column;gap:14px;margin-bottom:20px;}
.bubble{padding:14px 18px;border-radius:16px;max-width:70%;font-size:14px;line-height:1.5;}
.client{background:#f1f5f9;align-self:flex-start;}
.ai{background:#ede9fe;align-self:flex-start;}
.dark .client{background:#334155;}
.dark .ai{background:#4c1d95;}
.inputBox{background:white;border-radius:16px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,0.05);}
.dark .inputBox{background:#1e293b;}
textarea{width:100%;border:none;outline:none;resize:none;font-size:14px;min-height:60px;background:transparent;color:inherit;}
.actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.btn{padding:8px 14px;border-radius:10px;border:1px solid #e5e7eb;background:white;cursor:pointer;font-size:13px;}
.dark .btn{background:#0f172a;color:white;border:1px solid #334155;}
.primary{background:#7c3aed;color:white;border:none;}
.status{font-size:12px;margin-top:6px;color:#6b7280;}
</style>
</head>
<body>
<div class="app">
<div class="header">
<div class="brand">
<div class="logo">
<img src="icons/icon-192.png">
</div>
<div class="title">AI Assistant</div>
</div>
<button class="toggle" onclick="toggleDark()">🌙</button>
</div>
<div class="chat" id="chat">
<div class="bubble client" id="clientBubble"></div>
<div class="bubble ai" id="aiBubble"></div>
</div>
<div class="inputBox">
<textarea id="input" placeholder="Paste client message or type reply..."></textarea>
<div class="status" id="lang"></div>
<div class="actions">
<div>
<button class="btn" onclick="pasteText()">Paste</button>
<button class="btn" onclick="voice()">🎤 Voice</button>
<button class="btn" onclick="clearChat()">Reset</button>
</div>
<button class="btn primary" onclick="copy()">Copy Reply</button>
</div>
</div>
</div>

<script>
let clientLang="auto";
function toggleDark(){document.body.classList.toggle("dark");}
input.addEventListener("input",async function(){
let text=this.value;
if(text.length<2)return;
let res=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`);
let data=await res.json();
clientLang=data[2];
let english=data[0].map(x=>x[0]).join("");
clientBubble.innerText=english;
let res2=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${clientLang}&dt=t&q=${encodeURIComponent(english)}`);
let data2=await res2.json();
let reply=data2[0].map(x=>x[0]).join("");
aiBubble.innerText=reply;
lang.innerText="Detected language: "+clientLang;
});
function copy(){navigator.clipboard.writeText(aiBubble.innerText);}
async function pasteText(){let text=await navigator.clipboard.readText();input.value=text;input.dispatchEvent(new Event("input"));}
function clearChat(){input.value="";clientBubble.innerText="";aiBubble.innerText="";}
function voice(){let rec=new webkitSpeechRecognition();rec.lang="en-US";rec.onresult=e=>{input.value=e.results[0][0].transcript;input.dispatchEvent(new Event("input"));};rec.start();}
</script>
</body>
</html>
